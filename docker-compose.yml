services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - api1-socket:/var/run/api1
      - api2-socket:/var/run/api2
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "30M"
    networks:
      - rinha

  api1:
    build:
      context: .
      dockerfile: Rinha-2026-WebAPI/Dockerfile
    environment:
      - UNIX_SOCKET_PATH=/var/run/api/api.sock
      - INDEX_PATH=/app/index.bin
      - MODEL_PATH=/app/model.bin
    volumes:
      - api1-socket:/var/run/api
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha

  api2:
    build:
      context: .
      dockerfile: Rinha-2026-WebAPI/Dockerfile
    environment:
      - UNIX_SOCKET_PATH=/var/run/api/api.sock
      - INDEX_PATH=/app/index.bin
      - MODEL_PATH=/app/model.bin
    volumes:
      - api2-socket:/var/run/api
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge

volumes:
  api1-socket:
  api2-socket:
