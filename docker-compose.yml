services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: "30M"
    networks:
      - rinha

  api1:
    build:
      context: .
      dockerfile: Rinha-2026-WebAPI/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - INDEX_PATH=/app/index.bin
      - MODEL_PATH=/app/model.bin
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.44"
          memory: "160M"
    networks:
      - rinha

  api2:
    build:
      context: .
      dockerfile: Rinha-2026-WebAPI/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - INDEX_PATH=/app/index.bin
      - MODEL_PATH=/app/model.bin
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.44"
          memory: "160M"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
