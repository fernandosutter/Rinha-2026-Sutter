worker_processes 1;
worker_rlimit_nofile 4096;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 30;
    keepalive_requests 10000;

    upstream api {
        keepalive 64;
        server unix:/var/run/api1/api.sock;
        server unix:/var/run/api2/api.sock;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering on;
            proxy_request_buffering on;
        }
    }
}