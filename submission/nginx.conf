worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    sendfile on;
    tcp_nopush off;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100000;

    # Disable proxy buffering – payloads are tiny (<1 KB req, <100 B resp)
    # buffering adds an extra copy and delays response start.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_socket_keepalive on;

    # Minimum headers forwarded -> cheaper upstream parsing
    proxy_set_header Connection "";
    proxy_pass_request_headers off;
    proxy_set_header Content-Type "application/json";

    upstream api {
        server unix:/var/run/api1/api.sock max_fails=0;
        server unix:/var/run/api2/api.sock max_fails=0;
        keepalive 256;
        keepalive_requests 100000;
        keepalive_timeout 65s;
    }

    server {
        listen 9999 default_server backlog=4096;

        location = /fraud-score {
            proxy_pass http://api;
        }

        location = /ready {
            proxy_pass http://api;
        }
    }
}